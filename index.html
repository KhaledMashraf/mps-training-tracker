<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPS Training Tracker</title>
<style>
:root {
  --primary: #1a56db;
  --primary-dark: #1e40af;
  --bg: #f3f4f6;
  --border: #e5e7eb;
  --text: #111827;
  --muted: #6b7280;
  --danger: #e02424;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
#login-screen { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:linear-gradient(135deg,#1a56db 0%,#7c3aed 100%); padding:20px; }
.login-box { background:white; border-radius:16px; padding:40px; width:100%; max-width:480px; box-shadow:0 20px 60px rgba(0,0,0,0.2); }
.login-title { font-size:22px; font-weight:700; text-align:center; margin-bottom:6px; }
.login-subtitle { color:var(--muted); text-align:center; font-size:14px; margin-bottom:28px; }
.role-cards { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
.role-card { border:2px solid var(--border); border-radius:12px; padding:20px 12px; text-align:center; cursor:pointer; transition:all 0.2s; }
.role-card:hover { border-color:var(--primary); }
.role-card.selected { border-color:var(--primary); background:#eff6ff; }
.role-card .icon { font-size:32px; margin-bottom:8px; }
.role-card .label { font-weight:600; font-size:15px; }
.role-card .desc { font-size:12px; color:var(--muted); margin-top:4px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:var(--muted); }
.form-group input, .form-group select { width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:8px; font-size:15px; outline:none; }
.form-group input:focus, .form-group select:focus { border-color:var(--primary); }
.btn-login { width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; font-size:16px; font-weight:600; cursor:pointer; }
.btn-login:hover { background:var(--primary-dark); }
.login-error { color:var(--danger); font-size:13px; text-align:center; margin-top:10px; display:none; }
#app-screen { display:none; min-height:100vh; flex-direction:column; }
.app-header { background:var(--primary); color:white; padding:0 20px; display:flex; align-items:center; justify-content:space-between; height:56px; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,0.15); }
.app-title { font-size:16px; font-weight:700; }
.header-right { display:flex; align-items:center; gap:12px; }
.user-badge { font-size:13px; opacity:0.9; }
.sync-badge { font-size:12px; background:rgba(255,255,255,0.15); padding:3px 8px; border-radius:20px; }
.btn-logout { background:rgba(255,255,255,0.15); border:none; color:white; padding:5px 12px; border-radius:6px; cursor:pointer; font-size:13px; }
.btn-logout:hover { background:rgba(255,255,255,0.25); }
.tabs-bar { background:white; border-bottom:1px solid var(--border); display:flex; overflow-x:auto; padding:0 16px; }
.tab-btn { padding:14px 18px; border:none; background:none; font-size:13px; font-weight:600; color:var(--muted); cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap; transition:all 0.2s; }
.tab-btn:hover { color:var(--primary); }
.tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }
.tab-panel { display:none; padding:20px; max-width:1100px; margin:0 auto; width:100%; }
.tab-panel.active { display:block; }
.card { background:white; border-radius:var(--radius); border:1px solid var(--border); margin-bottom:16px; overflow:hidden; }
.card-header { padding:14px 16px; border-bottom:1px solid var(--border); font-weight:700; font-size:15px; display:flex; align-items:center; justify-content:space-between; }
.card-body { padding:16px; }
.items-table { width:100%; border-collapse:collapse; font-size:14px; }
.items-table th { background:#f9fafb; padding:10px 12px; text-align:left; font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; border-bottom:1px solid var(--border); }
.items-table td { padding:10px 12px; border-bottom:1px solid #f3f4f6; vertical-align:middle; }
.items-table tr:last-child td { border-bottom:none; }
.items-table tr:hover td { background:#f9fafb; }
.item-text { font-weight:600; font-size:14px; }
.item-desc { font-size:12px; color:var(--muted); margin-top:3px; line-height:1.4; }
.tp-table { width:100%; border-collapse:collapse; font-size:14px; }
.tp-table th { background:#f9fafb; padding:10px 14px; text-align:left; font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; border-bottom:2px solid var(--border); }
.tp-table td { padding:12px 14px; border-bottom:1px solid #f3f4f6; vertical-align:middle; }
.tp-table tr:hover td { background:#f9fafb; }
.status-select { padding:4px 8px; border:1px solid var(--border); border-radius:6px; font-size:12px; cursor:pointer; background:white; }
.badge { display:inline-block; padding:3px 10px; border-radius:12px; font-size:12px; font-weight:600; }
.b-ns { background:#f3f4f6; color:var(--muted); }
.b-ip { background:#fef3c7; color:#92400e; }
.b-ok { background:#d1fae5; color:#065f46; }
.b-hi { background:#ede9fe; color:#5b21b6; }
.b-med { background:#fff7ed; color:#c2410c; }
.score-btns { display:flex; gap:4px; }
.sbtn { width:28px; height:28px; border:1px solid var(--border); border-radius:6px; background:white; font-size:12px; font-weight:600; cursor:pointer; color:var(--muted); transition:all 0.15s; }
.sbtn:hover { border-color:var(--primary); color:var(--primary); }
.sbtn.active { background:var(--primary); color:white; border-color:var(--primary); }
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:20px; }
.stat-card { background:white; border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:center; }
.stat-num { font-size:28px; font-weight:700; color:var(--primary); }
.stat-lbl { font-size:12px; color:var(--muted); margin-top:4px; }
.pbar { background:#e5e7eb; border-radius:99px; height:8px; overflow:hidden; }
.pfill { height:100%; border-radius:99px; background:var(--primary); transition:width 0.3s; }
.btn { padding:8px 16px; border-radius:8px; border:none; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s; }
.btn-p { background:var(--primary); color:white; }
.btn-p:hover { background:var(--primary-dark); }
.btn-d { background:#fee2e2; color:var(--danger); }
.btn-d:hover { background:#fecaca; }
.btn-b { background:#eff6ff; color:var(--primary); }
.btn-b:hover { background:#dbeafe; }
.btn-sm { padding:5px 10px; font-size:12px; }
.frow { display:flex; gap:10px; margin-bottom:12px; align-items:flex-end; flex-wrap:wrap; }
.frow input, .frow select { flex:1; min-width:120px; padding:8px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; outline:none; }
.frow input:focus, .frow select:focus { border-color:var(--primary); }
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
.kpi-item { background:#f9fafb; border-radius:8px; padding:12px; }
.kpi-lbl { font-size:12px; font-weight:600; color:var(--muted); margin-bottom:6px; }
.kpi-inp { width:100%; padding:6px 10px; border:1.5px solid var(--border); border-radius:6px; font-size:15px; font-weight:700; text-align:center; outline:none; }
.kpi-inp:focus { border-color:var(--primary); }
.modal-ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; align-items:center; justify-content:center; }
.modal-ov.open { display:flex; }
.modal-box { background:white; border-radius:12px; padding:24px; width:90%; max-width:440px; box-shadow:0 20px 60px rgba(0,0,0,0.3); max-height:90vh; overflow-y:auto; }
.modal-title { font-size:16px; font-weight:700; margin-bottom:16px; }
.chk-list { display:flex; flex-direction:column; gap:8px; margin-bottom:20px; max-height:280px; overflow-y:auto; }
.chk-item { display:flex; align-items:center; gap:10px; font-size:14px; cursor:pointer; padding:7px 10px; border-radius:7px; border:1px solid transparent; }
.chk-item:hover { background:#f9fafb; border-color:var(--border); }
.chk-item input[type=checkbox] { width:16px; height:16px; cursor:pointer; flex-shrink:0; }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:8px; }
.modal-divider { border:none; border-top:1px solid var(--border); margin:14px 0; }
.signoff-box { background:#f0fdf4; border:1px solid #bbf7d0; border-radius:10px; padding:24px; }
.signoff-done { background:#d1fae5; border:1px solid #6ee7b7; border-radius:10px; padding:24px; }
.empty { text-align:center; padding:40px; color:var(--muted); }
.empty .icon { font-size:48px; margin-bottom:12px; }
@media(max-width:600px){.role-cards{grid-template-columns:1fr;}.tab-btn{padding:12px 10px;font-size:12px;}.stats-grid{grid-template-columns:repeat(2,1fr);}.login-box{padding:28px 20px;}}
</style>
</head>
<body>
 
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">🏭 MPS Training Tracker</div>
    <div class="login-subtitle">ABM Olayan — MPS Engineer Training</div>
    <div class="role-cards">
      <div class="role-card" id="role-manager" onclick="selectRole('manager')">
        <div class="icon">👔</div><div class="label">Manager</div><div class="desc">Full access</div>
      </div>
      <div class="role-card" id="role-trainee" onclick="selectRole('trainee')">
        <div class="icon">🎓</div><div class="label">Trainee</div><div class="desc">My progress</div>
      </div>
    </div>
    <div id="manager-fields" style="display:none">
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="mgr-pass" placeholder="Enter manager password">
      </div>
    </div>
    <div id="trainee-fields" style="display:none">
      <div class="form-group">
        <label>Select Your Name</label>
        <select id="trainee-sel"><option value="">Loading...</option></select>
      </div>
    </div>
    <button class="btn-login" onclick="doLogin()">Enter</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>
 
<div id="app-screen">
  <div class="app-header">
    <div class="app-title">🏭 MPS Training Tracker</div>
    <div class="header-right">
      <span class="user-badge" id="user-badge"></span>
      <span class="sync-badge" id="sync-badge">Synced ✓</span>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="tabs-bar" id="tabs-bar"></div>
  <div id="panels-container"></div>
</div>
 
<!-- ASSIGN MODAL -->
<div class="modal-ov" id="assign-modal">
  <div class="modal-box">
    <div class="modal-title" id="assign-title">Assign Item</div>
    <label class="chk-item" style="background:#f0fdf4;border:1px solid #bbf7d0;padding:10px 12px;border-radius:8px;margin-bottom:4px">
      <input type="checkbox" id="assign-all-chk" onchange="toggleAssignAll()">
      <span style="font-weight:700;color:#065f46">Assign to ALL Trainees</span>
    </label>
    <hr class="modal-divider">
    <div style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:10px" id="modal-specific-label">Or select specific trainees:</div>
    <div class="chk-list" id="assign-list"></div>
    <div class="modal-actions">
      <button class="btn" style="background:#f3f4f6" onclick="closeModal()">Cancel</button>
      <button class="btn btn-p" onclick="saveAssign()">Save Assignment</button>
    </div>
  </div>
</div>
 
<script>
const BIN_ID='69fad948aaba882197787296';
const MASTER_KEY='$2a$10$OiSQwRUUkyHIQ3WPOFfHxuZ4JglDAz8.3EkcIErNCrcEI6d4F4Yyu';
const MANAGER_PASS='MPS@2025';
const API_BASE='https://api.jsonbin.io/v3/b/'+BIN_ID;
 
const KPI_DEFS=[
  {key:'attendance',label:'Attendance %'},
  {key:'punctuality',label:'Punctuality %'},
  {key:'taskCompletion',label:'Task Completion %'},
  {key:'safetyCompliance',label:'Safety Compliance %'},
  {key:'qualityScore',label:'Quality Score %'},
];
 
const DEFAULT_ITEMS=[
  // Orientation & Access
  {id:'i1', group:'Orientation & Access', text:'Systems access granted',           desc:'CRM, Ticketing, SharePoint, internal knowledge base — all accessible',                                        priority:'High',   assignedTo:'all'},
  {id:'i2', group:'Orientation & Access', text:'Supervisor intro meeting',          desc:'1-hour meeting with Khaled — role, expectations, and plan reviewed',                                           priority:'High',   assignedTo:'all'},
  {id:'i3', group:'Orientation & Access', text:'MPS Division overview read',        desc:'Read and understood MPS Division overview document',                                                            priority:'High',   assignedTo:'all'},
  {id:'i4', group:'Orientation & Access', text:'MyQ Training Portal activated',     desc:'Account created on MyQ official training portal and first module started',                                     priority:'High',   assignedTo:'all'},
  {id:'i5', group:'Orientation & Access', text:'PaperCut Training Portal activated',desc:'Account created on PaperCut official training portal and first module started',                                priority:'High',   assignedTo:'all'},
  // Toshiba Hardware
  {id:'i6', group:'Toshiba Hardware',     text:'TCE/Disty Access',                 desc:'Common Toshiba error codes reviewed — knows top 20 and their causes',                                          priority:'Medium', assignedTo:'all'},
  {id:'i7', group:'Toshiba Hardware',     text:'Toshiba product range studied',     desc:'e-STUDIO product catalog reviewed — can name key models and their use cases',                                  priority:'High',   assignedTo:'all'},
  {id:'i8', group:'Toshiba Hardware',     text:'Hardware architecture understood',  desc:'Scanner / Controller / Engine / Finisher — components identified and explained',                               priority:'High',   assignedTo:'all'},
  {id:'i9', group:'Toshiba Hardware',     text:'Device configured from scratch',    desc:'Toshiba MFP set up independently: IP, network params, print, copy, scan all tested',                          priority:'High',   assignedTo:'all'},
  {id:'i10',group:'Toshiba Hardware',     text:'Real customer SLA reviewed',        desc:'Read and understood at least one live ABM customer contract/SLA',                                              priority:'Medium', assignedTo:'all'},
  // Software Install
  {id:'i11',group:'Software Install',     text:'MyQ Server installed',              desc:'MyQ Server installed with supervisor — Admin Panel accessible',                                                 priority:'High',   assignedTo:'all'},
  {id:'i12',group:'Software Install',     text:'PaperCut installed & configured',   desc:'PaperCut MF server installed, initial setup complete, devices added',                                          priority:'High',   assignedTo:'all'},
  // Toshiba Deep Dive
  {id:'i13',group:'Toshiba Deep Dive',    text:'Service manual navigation',         desc:'Can locate and navigate Toshiba service manuals for at least 2 device models',                                 priority:'Medium', assignedTo:'all'},
  {id:'i14',group:'Toshiba Deep Dive',    text:'5 hardware faults simulated',       desc:'Simulated and documented 5 hardware error scenarios with root cause and fix',                                   priority:'High',   assignedTo:'all'},
  {id:'i15',group:'Toshiba Deep Dive',    text:'Network troubleshooting on device', desc:'Resolved a simulated network connectivity issue on a Toshiba device independently',                            priority:'High',   assignedTo:'all'},
  {id:'i16',group:'Toshiba Deep Dive',    text:'Fault log document created',        desc:'How to collect logs for Apps and Devices',                                                                      priority:'Medium', assignedTo:'all'},
  // MyQ Advanced
  {id:'i17',group:'MyQ Advanced',         text:'User authentication working',       desc:'Card reader / PIN / AD authentication all tested and working',                                                  priority:'High',   assignedTo:'all'},
  {id:'i18',group:'MyQ Advanced',         text:'Print policies configured',         desc:'At least 3 print policies created: B&W only, duplex, page limits',                                             priority:'High',   assignedTo:'all'},
  {id:'i19',group:'MyQ Advanced',         text:'Cost centres set up',               desc:'Department cost centres created, costs allocated and visible in reporting',                                     priority:'Medium', assignedTo:'all'},
  {id:'i20',group:'MyQ Advanced',         text:'MyQ issue escalation',              desc:'3 escalation calls completed with support team',                                                                priority:'Medium', assignedTo:'all'},
  {id:'i21',group:'MyQ Advanced',         text:'PaperCut issue escalation',         desc:'3 escalation calls completed with support team',                                                                priority:'High',   assignedTo:'all'},
];
 
let role=null,currentTrainee=null,items=[],trainees=[],progress={},signoffDone=false,signoffInfo={},saveTimer=null,assignItemId=null;
 
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
 
async function fetchTraineesForLogin(){
  try{
    const r=await fetch(API_BASE+'/latest',{headers:{'X-Master-Key':MASTER_KEY}});
    if(!r.ok)return[];
    const d=await r.json();
    return(d.record&&d.record.trainees)?d.record.trainees:[];
  }catch(e){return[];}
}
 
function selectRole(r){
  role=r;
  document.querySelectorAll('.role-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('role-'+r).classList.add('selected');
  document.getElementById('manager-fields').style.display=r==='manager'?'block':'none';
  document.getElementById('trainee-fields').style.display=r==='trainee'?'block':'none';
  document.getElementById('login-error').style.display='none';
  if(r==='trainee'){
    const sel=document.getElementById('trainee-sel');
    sel.innerHTML='<option value="">Loading...</option>';
    fetchTraineesForLogin().then(list=>{
      if(list.length===0){sel.innerHTML='<option value="">No trainees added yet</option>';}
      else{sel.innerHTML='<option value="">-- Select your name --</option>'+list.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join('');}
    });
  }
}
 
async function doLogin(){
  if(!role){showErr('Please select a role.');return;}
  if(role==='manager'){
    if(document.getElementById('mgr-pass').value!==MANAGER_PASS){showErr('Incorrect password.');return;}
    await startApp('manager',null);
  }else{
    const name=document.getElementById('trainee-sel').value;
    if(!name){showErr('Please select your name.');return;}
    await startApp('trainee',name);
  }
}
function showErr(msg){const el=document.getElementById('login-error');el.textContent=msg;el.style.display='block';}
 
async function startApp(r,trainee){
  role=r;currentTrainee=trainee;
  try{
    const res=await fetch(API_BASE+'/latest',{headers:{'X-Master-Key':MASTER_KEY}});
    const data=await res.json();const rec=data.record||{};
    trainees=rec.trainees||[];
    progress=rec.progress||{};
    signoffDone=rec.signoffDone||false;
    signoffInfo=rec.signoffInfo||{};

    // Version check: if data is old (no version or version < 3), reset items to new MPS defaults
    if(!rec.version||rec.version<3){
      items=JSON.parse(JSON.stringify(DEFAULT_ITEMS));
      // Immediately push updated items+version to JSONBin so all users see them
      await fetch(API_BASE,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':MASTER_KEY},
        body:JSON.stringify({version:3,items,trainees,progress,signoffDone,signoffInfo})});
    }else{
      // Patch any stored items that might be missing new fields
      items=(rec.items||JSON.parse(JSON.stringify(DEFAULT_ITEMS))).map(it=>({
        priority: 'High',
        desc: '',
        assignedTo: 'all',
        ...it
      }));
    }
  }catch(e){items=JSON.parse(JSON.stringify(DEFAULT_ITEMS));trainees=[];progress={};}
  if(role==='trainee'&&currentTrainee&&!progress[currentTrainee])
    progress[currentTrainee]={statuses:{},kpiValues:{},assessScores:{}};
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='flex';
  document.getElementById('user-badge').textContent=role==='manager'?'👔 Manager':'🎓 '+currentTrainee;
  buildTabs();showTab(role==='manager'?'dashboard':'plan');
}
 
const MGR_TABS=[{id:'dashboard',label:'📊 Dashboard'},{id:'plan',label:'📋 Daily Plan'},{id:'trainees',label:'👥 Trainees'},{id:'items',label:'⚙️ Items'},{id:'signoff',label:'✅ Sign-Off'}];
const TRN_TABS=[{id:'plan',label:'📋 My Plan'},{id:'mydash',label:'📊 My Progress'}];
 
function buildTabs(){
  const tabs=role==='manager'?MGR_TABS:TRN_TABS;
  document.getElementById('tabs-bar').innerHTML=tabs.map(t=>`<button class="tab-btn" id="tab-${t.id}" onclick="showTab('${t.id}')">${t.label}</button>`).join('');
  document.getElementById('panels-container').innerHTML=tabs.map(t=>`<div class="tab-panel" id="panel-${t.id}"></div>`).join('');
}
 
function showTab(id){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  const btn=document.getElementById('tab-'+id),panel=document.getElementById('panel-'+id);
  if(btn)btn.classList.add('active');
  if(panel){panel.classList.add('active');renderPanel(id);}
}
 
function renderPanel(id){
  if(id==='dashboard')renderDash();
  else if(id==='plan')renderPlan();
  else if(id==='trainees')renderTrainees();
  else if(id==='items')renderItems();
  else if(id==='signoff')renderSignoff();
  else if(id==='mydash')renderMyDash();
}
 
// ── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDash(){
  const el=document.getElementById('panel-dashboard');
  if(trainees.length===0){
    el.innerHTML=`<div class="empty"><div class="icon">👥</div><div style="font-size:16px;font-weight:600;margin-bottom:8px">No trainees yet</div><div>Go to the <strong>Trainees</strong> tab to add names first.</div></div>`;
    return;
  }
  const rows=trainees.map(name=>{
    const p=progress[name]||{statuses:{},kpiValues:{},assessScores:{}};
    const asgn=items.filter(it=>isAsgn(it,name));
    const tot=asgn.length,done=asgn.filter(it=>p.statuses[it.id]==='complete').length,inp=asgn.filter(it=>p.statuses[it.id]==='in-progress').length;
    const pct=tot>0?Math.round(done/tot*100):0;
    const sc=Object.values(p.assessScores||{}).filter(s=>s>0);
    const avgSc=sc.length>0?(sc.reduce((a,b)=>a+b,0)/sc.length).toFixed(1):'—';
    const kv=Object.values(p.kpiValues||{}).map(Number).filter(v=>!isNaN(v)&&v>0);
    const avgKpi=kv.length>0?Math.round(kv.reduce((a,b)=>a+b,0)/kv.length)+'%':'—';
    return{name,tot,done,inp,pct,avgSc,avgKpi,p,asgn};
  });
  const ovAvg=Math.round(rows.reduce((a,r)=>a+r.pct,0)/rows.length);
  el.innerHTML=`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${trainees.length}</div><div class="stat-lbl">Trainees</div></div>

function planItems(tname,wid,editable){

function addTr(){
  const inp=document.getElementById('new-tr'),name=inp.value.trim();
  if(!name)return;
  if(trainees.includes(name)){alert('A trainee with this name already exists.');return;}
  trainees.push(name);
  if(!progress[name])progress[name]={statuses:{},kpiValues:{},assessScores:{}};
  // Auto-assign new trainee to ALL items (including those with specific assignments)
  items.forEach(it=>{
    if(Array.isArray(it.assignedTo)&&!it.assignedTo.includes(name)){
      it.assignedTo.push(name);
    }
  });
  inp.value='';scheduleSave();renderTrainees();
}
 
function rmTr(name){
  if(!confirm(`Remove "${name}" from the list?\nProgress data will be kept.`))return;
  trainees=trainees.filter(t=>t!==name);scheduleSave();renderTrainees();

// ── HELPERS ──────────────────────────────────────────────────────────────────
function isAsgn(item,name){
  if(item.assignedTo==='all')return true;
  if(Array.isArray(item.assignedTo))return item.assignedTo.includes(name);
  return false;
}
function ensurePr(name){if(!progress[name])progress[name]={statuses:{},kpiValues:{},assessScores:{}};}
function updSt(tname,itemId,val){ensurePr(tname);progress[tname].statuses[itemId]=val;scheduleSave();}
function updSc(tname,itemId,score){
  ensurePr(tname);
  if(!progress[tname].assessScores)progress[tname].assessScores={};
  const cur=progress[tname].assessScores[itemId]||0;
  progress[tname].assessScores[itemId]=cur===score?0:score;
  scheduleSave();
  if(role==='trainee')planItems(tname,'plan-wrap',true);
  else planItems(tname,'plan-wrap',false);
}
function updKpi(tname,key,val){
  ensurePr(tname);
  if(!progress[tname].kpiValues)progress[tname].kpiValues={};
  progress[tname].kpiValues[key]=val;
  scheduleSave();
}
 
// ── SYNC ─────────────────────────────────────────────────────────────────────
function setSyncStatus(s){const el=document.getElementById('sync-badge');if(!el)return;el.textContent=s==='synced'?'Synced ✓':s==='syncing'?'⟳ Syncing…':'⚠ Offline';}
function scheduleSave(){if(saveTimer)clearTimeout(saveTimer);setSyncStatus('syncing');saveTimer=setTimeout(saveBin,1200);}
async function saveBin(){
  try{
    const r=await fetch(API_BASE,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':MASTER_KEY},body:JSON.stringify({version:3,items,trainees,progress,signoffDone,signoffInfo})});
    setSyncStatus(r.ok?'synced':'offline');
  }catch(e){setSyncStatus('offline');}
}

  document.getElementById('app-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.querySelectorAll('.role-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('manager-fields').style.display='none';
  document.getElementById('trainee-fields').style.display='none';
  document.getElementById('mgr-pass').value='';
  document.getElementById('login-error').style.display='none';
}
 
document.addEventListener('keydown',function(e){if(e.key==='Enter'&&document.getElementById('login-screen').style.display!=='none')doLogin();});
</script>
</body>
</html>
